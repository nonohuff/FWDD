{% set name = "fwdd" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: e66d721d797f0bdd9dfc3b5cc8f6cf8f64e6c1cbbdf8aa69b7f88d60301d6a97

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=61.0.0
    - wheel
  run:
    - python >=3.9
    - numpy >=1.22.0
    - scipy >=1.8.0
    - pandas >=1.4.0
    - matplotlib-base >=3.5.0
    - seaborn >=0.11.0
    - numba >=0.55.0
    - scikit-learn >=1.0.0
    - scikit-optimize >=0.9.0
    - tqdm >=4.60.0
    - joblib >=1.1.0
    - psutil >=5.8.0

test:
  imports:
    - fwdd
    - fwdd.filter_function
    - fwdd.noise_spectra
    - fwdd.coherence_profile
    - fwdd.noise_learning_fitting
    - fwdd.fitting_utils

about:
  home: https://github.com/nonohuff/FWDD/tree/main
  license: MIT
  license_file: LICENSE
  summary: 'Finite Width Dynamical Decoupling (FWDD) implements Dynamical Decoupling considering the effects of Finite Pulse Widths.'
  description: |
    FWDD implements Dynamical Decoupling considering the effects of Finite Pulse Widths.
    It can be used to predict noise spectra, compute filter functions, coherence profiles,
    and fit noise profiles to observed coherence decay data.
  doc_url: https://github.com/nonohuff/FWDD/tree/main
  dev_url: https://github.com/nonohuff/FWDD/tree/main

extra:
  recipe-maintainers:
    - nonohuff
